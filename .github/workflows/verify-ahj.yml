name: Verify AHJ source URLs

on:
  schedule:
    - cron: "0 12 1 * *" # 12:00 UTC, 1st of each month
  workflow_dispatch:
  pull_request:
    paths:
      - "data/ahj/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:ahj
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ahj-verification-report
          path: reports/*.json
